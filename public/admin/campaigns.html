<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Campanhas — Admin UNIFATECIE</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>🗂️ Admin — Campanhas</h1>
    <nav style="display:flex; gap:16px; align-items:center;">
      <a class="admin-link" href="/admin/courses.html">Cursos</a>
      <a class="admin-link" href="/admin/campaigns.html">Campanhas</a>
      <a class="admin-link" href="/admin/import.html">Importar (IA)</a>
      <button id="logout-btn" class="admin-link" style="background:none;border:none;cursor:pointer;">Sair</button>
    </nav>
  </header>

  <main class="admin-container">
    <div class="card">
      <h2 style="margin-top:0;" id="form-title">Nova campanha</h2>
      <form id="campaign-form" class="form-grid">
        <input type="hidden" id="campaign-id" />
        <label>Nome da campanha
          <input type="text" id="name" placeholder="Ex: Campanha de Junho" required />
        </label>
        <label>Válida até
          <input type="date" id="validUntil" />
        </label>
        <label class="form-grid single" style="grid-column: 1 / -1;">Texto de bônus (opcional, ex: sorteio de carro)
          <textarea id="bonusText" rows="2" placeholder="🚗 Matriculando agora você concorre a 1 carro 0KM!"></textarea>
        </label>
        <label style="flex-direction:row; align-items:center; gap:8px;">
          <input type="checkbox" id="active" checked style="width:auto;" /> Campanha ativa (aparece na busca)
        </label>
        <div style="grid-column: 1 / -1; display:flex; gap:10px;">
          <button type="submit" class="btn-primary">Salvar</button>
          <button type="button" id="cancel-edit" class="btn-link" hidden>Cancelar edição</button>
        </div>
      </form>
      <p id="form-msg" class="error-msg" hidden></p>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">Campanhas cadastradas</h2>
      <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Nome</th><th>Válida até</th><th>Status</th><th></th></tr>
        </thead>
        <tbody id="campaigns-tbody"></tbody>
      </table>
      </div>
    </div>
  </main>

  <script src="/js/admin.js"></script>
  <script>
    let campaigns = [];

    function fmtDate(iso) {
      if (!iso) return '—';
      const [y, m, d] = iso.split('-');
      return `${d}/${m}/${y}`;
    }

    async function loadCampaigns() {
      campaigns = await apiFetch('/admin/api/campaigns');
      const tbody = document.getElementById('campaigns-tbody');
      tbody.innerHTML = '';
      for (const c of campaigns) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${c.name}</td>
          <td>${fmtDate(c.validUntil)}</td>
          <td><span class="tag">${c.active ? 'Ativa' : 'Inativa'}</span></td>
          <td>
            <button class="btn-link" data-edit="${c.id}">Editar</button>
            &nbsp;
            <button class="btn-link btn-danger" data-delete="${c.id}">Excluir</button>
          </td>`;
        tbody.appendChild(tr);
      }
      tbody.querySelectorAll('[data-edit]').forEach((btn) =>
        btn.addEventListener('click', () => startEdit(Number(btn.dataset.edit)))
      );
      tbody.querySelectorAll('[data-delete]').forEach((btn) =>
        btn.addEventListener('click', () => removeCampaign(Number(btn.dataset.delete)))
      );
    }

    function startEdit(id) {
      const c = campaigns.find((x) => x.id === id);
      if (!c) return;
      document.getElementById('form-title').textContent = `Editando: ${c.name}`;
      document.getElementById('campaign-id').value = c.id;
      document.getElementById('name').value = c.name;
      document.getElementById('validUntil').value = c.validUntil || '';
      document.getElementById('bonusText').value = c.bonusText || '';
      document.getElementById('active').checked = !!c.active;
      document.getElementById('cancel-edit').hidden = false;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
      document.getElementById('form-title').textContent = 'Nova campanha';
      document.getElementById('campaign-form').reset();
      document.getElementById('campaign-id').value = '';
      document.getElementById('active').checked = true;
      document.getElementById('cancel-edit').hidden = true;
    }

    async function removeCampaign(id) {
      if (!confirm('Excluir esta campanha? Os preços vinculados a ela também serão removidos.')) return;
      await apiFetch(`/admin/api/campaigns/${id}`, { method: 'DELETE' });
      await loadCampaigns();
    }

    document.getElementById('cancel-edit').addEventListener('click', resetForm);

    document.getElementById('campaign-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgEl = document.getElementById('form-msg');
      msgEl.hidden = true;
      const id = document.getElementById('campaign-id').value;
      const payload = {
        name: document.getElementById('name').value,
        validUntil: document.getElementById('validUntil').value || null,
        bonusText: document.getElementById('bonusText').value || null,
        active: document.getElementById('active').checked,
      };
      try {
        if (id) {
          await apiFetch(`/admin/api/campaigns/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
        } else {
          await apiFetch('/admin/api/campaigns', { method: 'POST', body: JSON.stringify(payload) });
        }
        resetForm();
        await loadCampaigns();
      } catch (err) {
        msgEl.textContent = err.message;
        msgEl.hidden = false;
      }
    });

    (async () => {
      if (!(await requireAuth())) return;
      wireLogout('logout-btn');
      await loadCampaigns();
    })();
  </script>
</body>
</html>
