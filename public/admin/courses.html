<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cursos — Admin UNIFATECIE</title>
<link rel="stylesheet" href="/css/style.css" />
<style>
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 50;
  }
  .modal-box {
    background: white; border-radius: 10px; padding: 20px; width: 100%; max-width: 640px;
    max-height: 90vh; overflow-y: auto;
  }
  .pricing-row { border-top: 1px solid #dde3ef; padding-top: 12px; margin-top: 12px; }
</style>
</head>
<body>
  <header class="topbar">
    <h1>📚 Admin — Cursos</h1>
    <nav style="display:flex; gap:16px; align-items:center;">
      <a class="admin-link" href="/admin/courses.html">Cursos</a>
      <a class="admin-link" href="/admin/campaigns.html">Campanhas</a>
      <a class="admin-link" href="/admin/import.html">Importar (IA)</a>
      <button id="logout-btn" class="admin-link" style="background:none;border:none;cursor:pointer;">Sair</button>
    </nav>
  </header>

  <main class="admin-container">
    <div class="card">
      <h2 style="margin-top:0;" id="form-title">Novo curso</h2>
      <form id="course-form" class="form-grid">
        <input type="hidden" id="course-id" />
        <label>Nome do curso
          <input type="text" id="name" placeholder="Ex: Fonoaudiologia" required />
        </label>
        <label>Nível
          <select id="level" required>
            <option value="graduacao">Graduação</option>
            <option value="pos">Pós-graduação</option>
          </select>
        </label>
        <label>Modalidade
          <input type="text" id="modality" placeholder="Ex: Semi-presencial, EAD, Presencial" required />
        </label>
        <label>Duração
          <input type="text" id="duration" placeholder="Ex: 4 anos" required />
        </label>
        <div style="grid-column: 1 / -1; display:flex; gap:10px;">
          <button type="submit" class="btn-primary">Salvar</button>
          <button type="button" id="cancel-edit" class="btn-link" hidden>Cancelar edição</button>
        </div>
      </form>
      <p id="form-msg" class="error-msg" hidden></p>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">Cursos cadastrados</h2>
      <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Nome</th><th>Nível</th><th>Modalidade</th><th>Duração</th><th>Preços</th><th></th></tr>
        </thead>
        <tbody id="courses-tbody"></tbody>
      </table>
      </div>
    </div>
  </main>

  <div id="pricing-modal" class="modal-overlay" hidden>
    <div class="modal-box">
      <h2 id="pricing-modal-title" style="margin-top:0;"></h2>
      <p style="color:#6b7280; font-size:13px;">Defina os valores desse curso para cada campanha ativa. Deixe em branco a campanha que não se aplica.</p>
      <div id="pricing-forms"></div>
      <div style="margin-top:16px; text-align:right;">
        <button id="pricing-close" class="btn-link">Fechar</button>
      </div>
    </div>
  </div>

  <script src="/js/admin.js"></script>
  <script>
    let courses = [];
    let campaigns = [];
    const levelLabel = { graduacao: 'Graduação', pos: 'Pós-graduação' };

    async function loadAll() {
      [courses, campaigns] = await Promise.all([
        apiFetch('/admin/api/courses'),
        apiFetch('/admin/api/campaigns'),
      ]);
      renderCourses();
    }

    function renderCourses() {
      const tbody = document.getElementById('courses-tbody');
      tbody.innerHTML = '';
      for (const c of courses) {
        const priceCount = (c.pricing || []).length;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${c.name}</td>
          <td>${levelLabel[c.level] || c.level}</td>
          <td>${c.modality}</td>
          <td>${c.duration}</td>
          <td><span class="tag">${priceCount} campanha(s)</span></td>
          <td>
            <button class="btn-link" data-price="${c.id}">Preços</button>
            &nbsp;
            <button class="btn-link" data-edit="${c.id}">Editar</button>
            &nbsp;
            <button class="btn-link btn-danger" data-delete="${c.id}">Excluir</button>
          </td>`;
        tbody.appendChild(tr);
      }
      tbody.querySelectorAll('[data-edit]').forEach((btn) =>
        btn.addEventListener('click', () => startEdit(Number(btn.dataset.edit)))
      );
      tbody.querySelectorAll('[data-delete]').forEach((btn) =>
        btn.addEventListener('click', () => removeCourse(Number(btn.dataset.delete)))
      );
      tbody.querySelectorAll('[data-price]').forEach((btn) =>
        btn.addEventListener('click', () => openPricingModal(Number(btn.dataset.price)))
      );
    }

    function startEdit(id) {
      const c = courses.find((x) => x.id === id);
      if (!c) return;
      document.getElementById('form-title').textContent = `Editando: ${c.name}`;
      document.getElementById('course-id').value = c.id;
      document.getElementById('name').value = c.name;
      document.getElementById('level').value = c.level;
      document.getElementById('modality').value = c.modality;
      document.getElementById('duration').value = c.duration;
      document.getElementById('cancel-edit').hidden = false;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
      document.getElementById('form-title').textContent = 'Novo curso';
      document.getElementById('course-form').reset();
      document.getElementById('course-id').value = '';
      document.getElementById('cancel-edit').hidden = true;
    }

    async function removeCourse(id) {
      if (!confirm('Excluir este curso e todos os preços vinculados a ele?')) return;
      await apiFetch(`/admin/api/courses/${id}`, { method: 'DELETE' });
      await loadAll();
    }

    document.getElementById('cancel-edit').addEventListener('click', resetForm);

    document.getElementById('course-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgEl = document.getElementById('form-msg');
      msgEl.hidden = true;
      const id = document.getElementById('course-id').value;
      const payload = {
        name: document.getElementById('name').value,
        level: document.getElementById('level').value,
        modality: document.getElementById('modality').value,
        duration: document.getElementById('duration').value,
      };
      try {
        if (id) {
          await apiFetch(`/admin/api/courses/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
        } else {
          await apiFetch('/admin/api/courses', { method: 'POST', body: JSON.stringify(payload) });
        }
        resetForm();
        await loadAll();
      } catch (err) {
        msgEl.textContent = err.message;
        msgEl.hidden = false;
      }
    });

    // ---- pricing modal ----

    function openPricingModal(courseId) {
      const course = courses.find((c) => c.id === courseId);
      if (!course) return;
      document.getElementById('pricing-modal-title').textContent = `Preços — ${course.name}`;
      const container = document.getElementById('pricing-forms');
      container.innerHTML = '';

      if (campaigns.length === 0) {
        container.innerHTML = '<p>Nenhuma campanha cadastrada ainda. Crie uma campanha primeiro.</p>';
      }

      for (const campaign of campaigns) {
        const existing = (course.pricing || []).find((p) => p.campaignId === campaign.id);
        const row = document.createElement('div');
        row.className = 'pricing-row';
        row.innerHTML = `
          <strong>${campaign.name}</strong> ${campaign.active ? '' : '<span class="tag">inativa</span>'}
          <div class="form-grid" style="margin-top:8px;">
            <label>Mensalidade De (R$)
              <input type="number" step="0.01" class="p-priceFrom" value="${existing?.priceFrom ?? ''}" />
            </label>
            <label>Mensalidade Por (R$)
              <input type="number" step="0.01" class="p-priceTo" value="${existing?.priceTo ?? ''}" />
            </label>
            <label>Desconto (%)
              <input type="number" class="p-discountPct" value="${existing?.discountPct ?? ''}" />
            </label>
            <label>Matrícula De (R$)
              <input type="number" step="0.01" class="p-enrollmentFeeFrom" value="${existing?.enrollmentFeeFrom ?? ''}" />
            </label>
            <label>Matrícula Por (R$)
              <input type="number" step="0.01" class="p-enrollmentFeeTo" value="${existing?.enrollmentFeeTo ?? ''}" />
            </label>
            <label>1ª mensalidade (texto, opcional)
              <input type="text" class="p-firstPaymentNote" value="${existing?.firstPaymentNote ?? ''}" placeholder="Ex: 1ª mensalidade apenas para Agosto!" />
            </label>
            <label class="form-grid single" style="grid-column: 1 / -1;">Observações extra (opcional)
              <textarea rows="2" class="p-notes">${existing?.notes ?? ''}</textarea>
            </label>
          </div>
          <div style="margin-top:8px; display:flex; gap:10px;">
            <button type="button" class="btn-primary p-save">Salvar preço nesta campanha</button>
            ${existing ? `<button type="button" class="btn-link btn-danger p-delete">Remover preço</button>` : ''}
          </div>
          <p class="p-msg error-msg" hidden></p>
        `;
        row.querySelector('.p-save').addEventListener('click', async () => {
          const msgEl = row.querySelector('.p-msg');
          msgEl.hidden = true;
          const val = (sel) => {
            const v = row.querySelector(sel).value;
            return v === '' ? null : Number(v);
          };
          const payload = {
            priceFrom: val('.p-priceFrom'),
            priceTo: val('.p-priceTo'),
            discountPct: val('.p-discountPct'),
            enrollmentFeeFrom: val('.p-enrollmentFeeFrom'),
            enrollmentFeeTo: val('.p-enrollmentFeeTo'),
            firstPaymentNote: row.querySelector('.p-firstPaymentNote').value || null,
            notes: row.querySelector('.p-notes').value || null,
          };
          try {
            await apiFetch(`/admin/api/pricing/${courseId}/${campaign.id}`, {
              method: 'PUT',
              body: JSON.stringify(payload),
            });
            await loadAll();
            openPricingModal(courseId);
          } catch (err) {
            msgEl.textContent = err.message;
            msgEl.hidden = false;
          }
        });
        const deleteBtn = row.querySelector('.p-delete');
        if (deleteBtn) {
          deleteBtn.addEventListener('click', async () => {
            if (!confirm('Remover o preço deste curso nesta campanha?')) return;
            await apiFetch(`/admin/api/pricing/${existing.id}`, { method: 'DELETE' });
            await loadAll();
            openPricingModal(courseId);
          });
        }
        container.appendChild(row);
      }

      document.getElementById('pricing-modal').hidden = false;
    }

    document.getElementById('pricing-close').addEventListener('click', () => {
      document.getElementById('pricing-modal').hidden = true;
    });

    (async () => {
      if (!(await requireAuth())) return;
      wireLogout('logout-btn');
      await loadAll();
    })();
  </script>
</body>
</html>
