<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vouchers — Admin UNIFATECIE</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>🎟️ Admin — Vouchers</h1>
    <nav style="display:flex; gap:16px; align-items:center;">
      <a class="admin-link" href="/admin/courses.html">Cursos</a>
      <a class="admin-link" href="/admin/campaigns.html">Campanhas</a>
      <a class="admin-link" href="/admin/links.html">Links</a>
      <a class="admin-link" href="/admin/vouchers.html">Vouchers</a>
      <a class="admin-link" href="/admin/import.html">Importar (IA)</a>
      <button id="logout-btn" class="admin-link" style="background:none;border:none;cursor:pointer;">Sair</button>
    </nav>
  </header>

  <main class="admin-container">
    <div class="card">
      <h2 style="margin-top:0;" id="form-title">Novo voucher</h2>
      <p style="color:#6b7280; font-size:13px; margin-top:-8px;">
        Esses códigos aparecem sempre visíveis (sem precisar clicar em nada) no topo da tela do vendedor. Atualize aqui todo mês.
      </p>
      <form id="voucher-form" class="form-grid">
        <input type="hidden" id="voucher-id" />
        <label>Nome (ex: Graduação, Pós-Graduação)
          <input type="text" id="name" placeholder="Ex: Graduação" required />
        </label>
        <label>Código do voucher
          <input type="text" id="code" placeholder="Ex: 1GANHE4" required />
        </label>
        <label style="flex-direction:row; align-items:center; gap:8px;">
          <input type="checkbox" id="active" checked style="width:auto;" /> Ativo (aparece no card)
        </label>
        <div style="grid-column: 1 / -1; display:flex; gap:10px;">
          <button type="submit" class="btn-primary">Salvar</button>
          <button type="button" id="cancel-edit" class="btn-link" hidden>Cancelar edição</button>
        </div>
      </form>
      <p id="form-msg" class="error-msg" hidden></p>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">Vouchers cadastrados</h2>
      <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Nome</th><th>Código</th><th>Status</th><th></th></tr>
        </thead>
        <tbody id="vouchers-tbody"></tbody>
      </table>
      </div>
    </div>
  </main>

  <script src="/js/admin.js"></script>
  <script>
    let vouchers = [];

    async function loadVouchers() {
      vouchers = await apiFetch('/admin/api/vouchers');
      const tbody = document.getElementById('vouchers-tbody');
      tbody.innerHTML = '';
      for (const v of vouchers) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${v.name}</td>
          <td><code>${v.code}</code></td>
          <td><span class="tag">${v.active ? 'Ativo' : 'Inativo'}</span></td>
          <td>
            <button class="btn-link" data-edit="${v.id}">Editar</button>
            &nbsp;
            <button class="btn-link btn-danger" data-delete="${v.id}">Excluir</button>
          </td>`;
        tbody.appendChild(tr);
      }
      tbody.querySelectorAll('[data-edit]').forEach((btn) =>
        btn.addEventListener('click', () => startEdit(Number(btn.dataset.edit)))
      );
      tbody.querySelectorAll('[data-delete]').forEach((btn) =>
        btn.addEventListener('click', () => removeVoucher(Number(btn.dataset.delete)))
      );
    }

    function startEdit(id) {
      const v = vouchers.find((x) => x.id === id);
      if (!v) return;
      document.getElementById('form-title').textContent = `Editando: ${v.name}`;
      document.getElementById('voucher-id').value = v.id;
      document.getElementById('name').value = v.name;
      document.getElementById('code').value = v.code;
      document.getElementById('active').checked = !!v.active;
      document.getElementById('cancel-edit').hidden = false;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
      document.getElementById('form-title').textContent = 'Novo voucher';
      document.getElementById('voucher-form').reset();
      document.getElementById('voucher-id').value = '';
      document.getElementById('active').checked = true;
      document.getElementById('cancel-edit').hidden = true;
    }

    async function removeVoucher(id) {
      if (!confirm('Excluir este voucher?')) return;
      await apiFetch(`/admin/api/vouchers/${id}`, { method: 'DELETE' });
      await loadVouchers();
    }

    document.getElementById('cancel-edit').addEventListener('click', resetForm);

    document.getElementById('voucher-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgEl = document.getElementById('form-msg');
      msgEl.hidden = true;
      const id = document.getElementById('voucher-id').value;
      const payload = {
        name: document.getElementById('name').value,
        code: document.getElementById('code').value,
        active: document.getElementById('active').checked,
      };
      try {
        if (id) {
          await apiFetch(`/admin/api/vouchers/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
        } else {
          await apiFetch('/admin/api/vouchers', { method: 'POST', body: JSON.stringify(payload) });
        }
        resetForm();
        await loadVouchers();
      } catch (err) {
        msgEl.textContent = err.message;
        msgEl.hidden = false;
      }
    });

    (async () => {
      if (!(await requireAuth())) return;
      wireLogout('logout-btn');
      await loadVouchers();
    })();
  </script>
</body>
</html>
